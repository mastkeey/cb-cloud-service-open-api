openapi: 3.0.1
info:
  title: Cloud Service API
  version: v0
servers:
  - url: http://localhost:8080
    description: Generated server url
paths:
  "/api/v1/workspaces":
    post:
      tags:
        - workspace-controller
      operationId: createWorkspace
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateWorkspaceRequest"
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/WorkspaceResponse"
  "/api/v1/users":
    post:
      tags:
        - user-controller
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/CreateUserRequest"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CreateUserResponse"
        '400':
          $ref: "#/components/responses/BadRequest"
  "/api/v1/users/{userId}/workspaces/{workspaceId}":
    post:
      tags:
        - user-controller
      operationId: addNewWorkspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
  "/api/v1/files/users/{userId}/workspaces/{workspaceId}":
    get:
      tags:
        - file-controller
      operationId: getFilesInfo
      parameters:
        - name: pageNumber
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageFileResponse"
    post:
      tags:
        - file-controller
      operationId: uploadFiles
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Массив загружаемых файлов
      responses:
        '200':
          description: OK
  "/api/v1/workspaces/{workspaceId}/users/{userId}":
    delete:
      tags:
        - workspace-controller
      operationId: deleteWorkspace
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
    patch:
      tags:
        - workspace-controller
      operationId: changeWorkspaceName
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: newWorkspaceName
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/WorkspaceResponse"
  "/api/v1/workspaces/users/{userId}":
    get:
      tags:
        - workspace-controller
      operationId: getWorkspaces
      parameters:
        - name: pageNumber
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageWorkspaceResponse"
  "/api/v1/workspaces/users/{userId}/all":
    get:
      tags:
        - workspace-controller
      operationId: getAllWorkspaces
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkspaceResponse"
  "/api/v1/files/{fileId}/users/{userId}/workspaces/{workspaceId}":
    get:
      tags:
        - file-controller
      operationId: getFile
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
    delete:
      tags:
        - file-controller
      operationId: deleteFile
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
components:
  schemas:
    Page:
      type: object
      properties:
        content:
          type: array
          items:
            anyOf: [ ]
        totalPages:
          type: integer
        totalElements:
          type: integer
    PageFileResponse:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: "#/components/schemas/FileResponse"
    PageWorkspaceResponse:
      allOf:
        - $ref: "#/components/schemas/Page"
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: "#/components/schemas/WorkspaceResponse"
    CreateWorkspaceRequest:
      required:
        - name
        - userId
      type: object
      properties:
        name:
          type: string
        userId:
          type: string
          format: uuid
    WorkspaceResponse:
      type: object
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        userId:
          type: string
          format: uuid
    CreateUserRequest:
      required:
        - username
      type: object
      properties:
        username:
          type: string
    CreateUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
    FileResponse:
      type: object
      properties:
        fileId:
          type: string
          format: uuid
        fileName:
          type: string
    ErrorResponse:
      properties:
        message:
          type: string
        status:
          type: integer
        code:
          type: string
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'